<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expenses | Business Management</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <!-- Auth SDK Re-added to recover your User ID -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        /* --- CSS VARIABLES & THEME --- */
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338ca;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;

            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-sidebar: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        
        button { cursor: pointer; border: none; font-family: inherit; }
        a { text-decoration: none; color: inherit; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 14px;
            transition: var(--transition);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }

        /* --- UTILITIES --- */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 700; }
        .text-muted { color: var(--text-muted); }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-warning { color: var(--warning); }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .hidden { display: none !important; }
        .pointer { cursor: pointer; }

        /* --- COMPONENTS --- */
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline { border: 1px solid var(--border); background: transparent; color: var(--text-main); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-danger:hover { background: #fecaca; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-block { width: 100%; justify-content: center; }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }

        .badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.paid { background: #d1fae5; color: #065f46; }
        .badge.unpaid { background: #fee2e2; color: #991b1b; }
        .badge.partial { background: #ffedd5; color: #9a3412; }

        /* --- LAYOUT --- */
        #app { display: none; height: 100vh; width: 100vw; } /* Default Hidden */
        
        /* Sidebar */
        aside {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: transform 0.3s ease;
        }
        .logo-area {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
        }
        .logo-icon { color: var(--primary); font-size: 28px; margin-right: 10px; }
        .logo-text { font-size: 18px; font-weight: 700; color: var(--text-main); }
        
        .nav-links { padding: 20px 10px; flex: 1; overflow-y: auto; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-muted);
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: var(--transition);
        }
        .nav-item i { font-size: 20px; margin-right: 12px; }
        .nav-item:hover { background: rgba(79, 70, 229, 0.05); color: var(--primary); }
        .nav-item.active { background: var(--primary); color: white; }
        
        .user-profile {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        header {
            height: 70px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 10;
        }
        [data-theme="dark"] header { background: rgba(30, 41, 59, 0.8); }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        /* Login Screen */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-body);
            z-index: 100;
            display: flex; /* Default Visible */
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 400px;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        /* Tables */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-size: 12px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; background: rgba(0,0,0,0.02); }
        tr:hover { background: rgba(0,0,0,0.01); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }

        /* Dashboard Widgets */
        .stat-card { padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 10px; }
        .bg-blue { background: #e0e7ff; color: var(--primary); }
        .bg-green { background: #dcfce7; color: var(--success); }
        .bg-orange { background: #ffedd5; color: var(--warning); }
        .bg-red { background: #fee2e2; color: var(--danger); }
        
        .stat-value { font-size: 24px; font-weight: 700; color: var(--text-main); margin: 5px 0; }
        .stat-label { font-size: 13px; color: var(--text-muted); }

        /* Charts */
        .chart-container { height: 300px; position: relative; width: 100%; }
        
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--bg-card); width: 500px; max-width: 90%;
            border-radius: 16px; padding: 24px;
            box-shadow: var(--shadow-lg);
            transform: translateY(20px); transition: transform 0.3s;
        }
        .modal-overlay.open .modal { transform: translateY(0); }

        /* Toast */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: var(--bg-card); padding: 12px 20px; border-radius: 8px;
            box-shadow: var(--shadow-lg); border-left: 4px solid var(--primary);
            display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.3s ease; font-size: 14px;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 1024px) {
            .grid-cols-4 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            aside { position: fixed; left: -260px; height: 100%; box-shadow: var(--shadow-lg); }
            aside.open { left: 0; }
            .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr; }
            header { padding: 0 15px; }
            .content-area { padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="auth-screen">
        <div class="login-box">
            <div style="font-size: 40px; color: var(--primary); margin-bottom: 10px;">
                <i class="ph ph-chart-polar"></i>
            </div>
            <h2 class="font-bold mb-4" style="font-size: 24px;">Smart Expenses</h2>
            
            <form onsubmit="handleLogin(event)" class="flex flex-col gap-4">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app">
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <div class="logo-area">
                <i class="ph-fill ph-chart-polar logo-icon"></i>
                <span class="logo-text">Smart Expenses</span>
            </div>
            <nav class="nav-links">
                <div class="nav-item active" onclick="router.navigate('dashboard')">
                    <i class="ph ph-squares-four"></i> Dashboard
                </div>
                <div class="nav-item" onclick="router.navigate('suppliers')">
                    <i class="ph ph-users"></i> Suppliers
                </div>
                <div class="nav-item" onclick="router.navigate('purchases')">
                    <i class="ph ph-shopping-cart"></i> Purchases
                </div>
                <div class="nav-item" onclick="router.navigate('payments')">
                    <i class="ph ph-bank"></i> Payments
                </div>
                <div class="nav-item" onclick="router.navigate('expenses')">
                    <i class="ph ph-receipt"></i> Expenses
                </div>
                <div class="nav-item" onclick="router.navigate('dues')">
                    <i class="ph ph-warning-circle"></i> Dues & Alerts
                </div>
                <div class="nav-item" onclick="router.navigate('reports')">
                    <i class="ph ph-file-text"></i> Reports
                </div>
            </nav>
            <div class="user-profile">
                <div class="avatar" id="user-avatar">U</div>
                <div style="flex: 1;">
                    <div class="text-sm font-bold" id="user-name">User</div>
                    <div class="text-xs text-muted">Manager</div>
                </div>
                <i class="ph ph-sign-out pointer" style="color: var(--danger);" onclick="handleLogout()"></i>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main>
            <header>
                <button class="btn btn-outline" onclick="toggleSidebar()" style="padding: 8px;">
                    <i class="ph ph-list"></i>
                </button>
                <div class="flex items-center gap-4">
                    <div class="text-sm font-bold hidden-mobile">Smart Expenses</div>
                    <button class="btn btn-outline btn-sm" onclick="toggleTheme()">
                        <i class="ph ph-moon"></i>
                    </button>
                </div>
            </header>

            <div class="content-area" id="main-view">
                <!-- Views will be injected here via JS -->
            </div>
        </main>
    </div>

    <!-- GENERIC MODAL -->
    <div class="modal-overlay" id="generic-modal">
        <div class="modal">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modal-title" class="font-bold text-lg">Title</h3>
                <button onclick="closeModal()" style="background: none; font-size: 20px;"><i class="ph ph-x"></i></button>
            </div>
            <div id="modal-content">
                <!-- Form content injected here -->
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
        /**
         * --------------------------------------------------------------------------
         * CONFIGURATION & FIREBASE INIT
         * --------------------------------------------------------------------------
         */
        const firebaseConfig = {
            apiKey: "AIzaSyBoApCsLCM-Vg7uFeje1mcgzHAaLZi4XQQ",
            authDomain: "smart-expenses-8e1d6.firebaseapp.com",
            projectId: "smart-expenses-8e1d6",
            storageBucket: "smart-expenses-8e1d6.firebasestorage.app",
            messagingSenderId: "1029812324107",
            appId: "1:1029812324107:web:d612810211d783d0d3440e",
            measurementId: "G-HWCJ9319T7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const firebaseAuth = firebase.auth(); // Initialized to get UID
        const db = firebase.firestore();

        // Hardcoded Credentials
        const ALLOWED_EMAIL = "smartexpense@gmail.com";
        const ALLOWED_PASS = "Smart@123";
        
        // This variable will hold the REAL ID to recover data
        let globalUserId = null;

        /**
         * --------------------------------------------------------------------------
         * HYBRID AUTHENTICATION (Simple UI + Real Connection)
         * --------------------------------------------------------------------------
         */

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 1. Check hardcoded string
            if (email === ALLOWED_EMAIL && password === ALLOWED_PASS) {
                try {
                    // 2. Perform REAL Firebase login to get the ID
                    const userCredential = await firebaseAuth.signInWithEmailAndPassword(email, password);
                    globalUserId = userCredential.user.uid; // Get the Real ID
                    
                    // 3. Show App
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    
                    document.getElementById('user-name').textContent = "Admin";
                    document.getElementById('user-avatar').textContent = "A";
                    
                    router.navigate('dashboard');
                    utils.showToast('Welcome back! Data recovered.', 'success');
                } catch (error) {
                    // Account might not exist if this is a fresh browser or they wiped auth
                    if(error.code === 'auth/user-not-found') {
                        utils.showToast('User not found in Firebase. Creating new account...', 'warning');
                        try {
                            const createCred = await firebaseAuth.createUserWithEmailAndPassword(email, password);
                            globalUserId = createCred.user.uid;
                            document.getElementById('auth-screen').style.display = 'none';
                            document.getElementById('app').style.display = 'flex';
                            router.navigate('dashboard');
                        } catch(createErr) {
                             utils.showToast('Error creating account: ' + createErr.message, 'danger');
                        }
                    } else {
                        utils.showToast('Login Error: ' + error.message, 'danger');
                    }
                }
            } else {
                utils.showToast('Incorrect ID or Password', 'danger');
            }
        };

        window.handleLogout = () => {
            // Logout and Reload to clear session
            firebaseAuth.signOut().then(() => {
                location.reload();
            });
        };

        /**
         * --------------------------------------------------------------------------
         * DATABASE SERVICE (FIRESTORE)
         * --------------------------------------------------------------------------
         */
        const DB = {
            get: async (collection) => {
                try {
                    // Use the globalUserId which is now your Real ID
                    if (!globalUserId) return []; 
                    const snap = await db.collection(collection).where("userId", "==", globalUserId).get();
                    return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error("DB Get Error:", error);
                    utils.showToast("Error loading data.", "danger");
                    return [];
                }
            },
            add: async (collection, item) => {
                try {
                    if (!globalUserId) return null;
                    const itemWithUser = { ...item, userId: globalUserId, createdAt: new Date() };
                    const docRef = await db.collection(collection).add(itemWithUser);
                    return { id: docRef.id, ...itemWithUser };
                } catch (error) {
                    console.error("DB Add Error:", error);
                    utils.showToast("Error saving data.", "danger");
                    return null;
                }
            },
            update: async (collection, id, updates) => {
                try {
                    await db.collection(collection).doc(id).update(updates);
                } catch (error) {
                    console.error("DB Update Error:", error);
                    utils.showToast("Error updating data.", "danger");
                }
            },
            delete: async (collection, id) => {
                try {
                    await db.collection(collection).doc(id).delete();
                } catch (error) {
                    console.error("DB Delete Error:", error);
                    utils.showToast("Error deleting data.", "danger");
                }
            }
        };

        /**
         * --------------------------------------------------------------------------
         * UI CONTROLLER & ROUTER
         * --------------------------------------------------------------------------
         */
        
        const utils = {
            formatCurrency: (amount) => {
                return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(amount);
            },
            formatDate: (dateStr) => {
                if(!dateStr) return '-';
                return new Date(dateStr).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            },
            showToast: (msg, type = 'info') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast`;
                toast.style.borderLeftColor = `var(--${type})`;
                toast.innerHTML = `<i class="ph ph-info"></i> <span>${msg}</span>`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        };

        const router = {
            current: 'dashboard',
            navigate: async (view) => {
                router.current = view;
                const container = document.getElementById('main-view');
                container.innerHTML = `<div class="flex justify-center p-6"><i class="ph ph-spinner ph-spin" style="font-size: 30px; color: var(--primary)"></i></div>`;
                
                setTimeout(async () => {
                    if (views[view]) {
                        container.innerHTML = await views[view]();
                        if(view === 'dashboard') dashboardLogic.init();
                    } else {
                        container.innerHTML = '<h1>404 Page Not Found</h1>';
                    }
                }, 150);
            }
        };

        /**
         * --------------------------------------------------------------------------
         * MODULE VIEWS
         * --------------------------------------------------------------------------
         */

        const views = {
            dashboard: async () => {
                const purchases = await DB.get('purchases');
                const expenses = await DB.get('expenses');
                
                const totalPurchases = purchases.reduce((acc, curr) => acc + Number(curr.amount), 0);
                const totalExpenses = expenses.reduce((acc, curr) => acc + Number(curr.amount), 0);
                const totalDues = purchases.reduce((acc, curr) => acc + (Number(curr.amount) - Number(curr.paid)), 0);
                
                const netCashFlow = totalPurchases - totalExpenses;

                return `
                    <div class="mb-4">
                        <h2 class="font-bold" style="font-size: 24px;">Dashboard</h2>
                        <p class="text-muted">Overview of your business performance</p>
                    </div>
                    
                    <!-- Stats Grid -->
                    <div class="grid grid-cols-4 gap-4 mb-4">
                        <div class="card stat-card">
                            <div>
                                <div class="stat-label">Total Purchases</div>
                                <div class="stat-value text-primary">${utils.formatCurrency(totalPurchases)}</div>
                                <div class="text-xs text-muted">Stock value</div>
                            </div>
                            <div class="stat-icon bg-blue"><i class="ph ph-shopping-cart"></i></div>
                        </div>
                        <div class="card stat-card">
                            <div>
                                <div class="stat-label">Outstanding Dues</div>
                                <div class="stat-value text-danger">${utils.formatCurrency(totalDues)}</div>
                                <div class="text-xs text-danger">${purchases.filter(p=>p.status!=='Paid').length} Pending</div>
                            </div>
                            <div class="stat-icon bg-red"><i class="ph ph-warning"></i></div>
                        </div>
                        <div class="card stat-card">
                            <div>
                                <div class="stat-label">Total Expenses</div>
                                <div class="stat-value text-warning">${utils.formatCurrency(totalExpenses)}</div>
                                <div class="text-xs text-muted">Operational costs</div>
                            </div>
                            <div class="stat-icon bg-orange"><i class="ph ph-receipt"></i></div>
                        </div>
                        <div class="card stat-card">
                            <div>
                                <div class="stat-label">Net Balance</div>
                                <div class="stat-value text-success">${utils.formatCurrency(netCashFlow)}</div>
                                <div class="text-xs text-muted">Purchases - Expenses</div>
                            </div>
                            <div class="stat-icon bg-green"><i class="ph ph-chart-line-up"></i></div>
                        </div>
                    </div>

                    <!-- Charts Section -->
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="card p-6">
                            <h3 class="font-bold mb-4">Purchase vs Expenses</h3>
                            <div class="chart-container">
                                <canvas id="barChart"></canvas>
                            </div>
                        </div>
                        <div class="card p-6">
                            <h3 class="font-bold mb-4">Payment Trends</h3>
                            <div class="chart-container">
                                <canvas id="lineChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Activity -->
                    <div class="card p-6">
                        <h3 class="font-bold mb-4">Recent Transactions</h3>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Details</th>
                                        <th>Type</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${purchases.length === 0 && expenses.length === 0 ? '<tr><td colspan="5" class="empty-state">No transactions found.</td></tr>' : ''}
                                    ${purchases.slice(0, 3).map(p => `
                                        <tr>
                                            <td>${utils.formatDate(p.date)}</td>
                                            <td>Purchase #${p.id.substr(0,5)}...</td>
                                            <td>Purchase</td>
                                            <td>${utils.formatCurrency(p.amount)}</td>
                                            <td><span class="badge ${p.status.toLowerCase()}">${p.status}</span></td>
                                        </tr>
                                    `).join('')}
                                    ${expenses.slice(0, 2).map(e => `
                                        <tr>
                                            <td>${utils.formatDate(e.date)}</td>
                                            <td>${e.category}</td>
                                            <td>Expense</td>
                                            <td>${utils.formatCurrency(e.amount)}</td>
                                            <td><span class="badge paid">Paid</span></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            suppliers: async () => {
                const suppliers = await DB.get('suppliers');
                return `
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h2 class="font-bold" style="font-size: 24px;">Suppliers</h2>
                            <p class="text-muted">Manage your supplier database</p>
                        </div>
                        <button class="btn btn-primary" onclick="openSupplierModal()"><i class="ph ph-plus"></i> Add Supplier</button>
                    </div>
                    <div class="card">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Contact Person</th>
                                        <th>Phone</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${suppliers.length ? suppliers.map(s => `
                                        <tr>
                                            <td class="font-bold">${s.name}</td>
                                            <td>${s.contact}</td>
                                            <td>${s.phone}</td>
                                            <td>
                                                <button class="btn btn-danger btn-sm" onclick="deleteItem('suppliers', '${s.id}')"><i class="ph ph-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="4" class="empty-state">No suppliers added yet.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            purchases: async () => {
                const purchases = await DB.get('purchases');
                const suppliers = await DB.get('suppliers');
                return `
                     <div class="flex justify-between items-center mb-4">
                        <div>
                            <h2 class="font-bold" style="font-size: 24px;">Purchases</h2>
                            <p class="text-muted">Track inventory purchases and stock-in</p>
                        </div>
                        <button class="btn btn-primary" onclick="openPurchaseModal()"><i class="ph ph-plus"></i> New Purchase</button>
                    </div>
                    <div class="card">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Supplier</th>
                                        <th>Total</th>
                                        <th>Paid</th>
                                        <th>Due</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${purchases.length ? purchases.map(p => {
                                        const sup = suppliers.find(s => s.id === p.supplierId) || {name: 'Unknown'};
                                        const due = p.amount - p.paid;
                                        return `
                                        <tr>
                                            <td>${utils.formatDate(p.date)}</td>
                                            <td>${sup.name}</td>
                                            <td>${utils.formatCurrency(p.amount)}</td>
                                            <td>${utils.formatCurrency(p.paid)}</td>
                                            <td class="font-bold text-danger">${utils.formatCurrency(due)}</td>
                                            <td><span class="badge ${p.status.toLowerCase()}">${p.status}</span></td>
                                            <td>
                                                <button class="btn btn-outline btn-sm" onclick="openPaymentModal('${p.id}', ${due})">Pay</button>
                                            </td>
                                        </tr>
                                    `}).join('') : '<tr><td colspan="7" class="empty-state">No purchases recorded.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            payments: async () => {
                const payments = await DB.get('payments');
                const purchases = await DB.get('purchases');
                const suppliers = await DB.get('suppliers');

                return `
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h2 class="font-bold" style="font-size: 24px;">Payments History</h2>
                            <p class="text-muted">Record of all payments made to suppliers</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Supplier</th>
                                        <th>Method</th>
                                        <th>Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${payments.length ? payments.map(pay => {
                                        const purch = purchases.find(pur => pur.id === pay.purchaseId);
                                        if(!purch) return '';
                                        const sup = suppliers.find(s => s.id === purch.supplierId) || {name: 'Unknown'};
                                        return `
                                            <tr>
                                                <td>${utils.formatDate(pay.date)}</td>
                                                <td>${sup.name}</td>
                                                <td>${pay.method}</td>
                                                <td class="text-success font-bold">+ ${utils.formatCurrency(pay.amount)}</td>
                                            </tr>
                                        `;
                                    }).join('') : '<tr><td colspan="4" class="empty-state">No payments recorded yet.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },
            
            expenses: async () => {
                const expenses = await DB.get('expenses');
                return `
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h2 class="font-bold" style="font-size: 24px;">Expenses</h2>
                            <p class="text-muted">Daily operational costs</p>
                        </div>
                        <button class="btn btn-primary" onclick="openExpenseModal()"><i class="ph ph-plus"></i> Add Expense</button>
                    </div>
                    <div class="card">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Category</th>
                                        <th>Description</th>
                                        <th>Amount</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${expenses.length ? expenses.map(e => `
                                        <tr>
                                            <td>${utils.formatDate(e.date)}</td>
                                            <td><span class="badge" style="background:var(--border)">${e.category}</span></td>
                                            <td>${e.description}</td>
                                            <td>${utils.formatCurrency(e.amount)}</td>
                                            <td><button class="btn btn-danger btn-sm" onclick="deleteItem('expenses', '${e.id}')"><i class="ph ph-trash"></i></button></td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="5" class="empty-state">No expenses recorded.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },

            dues: async () => {
                const purchases = await DB.get('purchases');
                const suppliers = await DB.get('suppliers');
                const today = new Date().toISOString().split('T')[0];
                
                const dues = purchases.map(p => {
                    const sup = suppliers.find(s => s.id === p.supplierId) || {name: 'Unknown'};
                    const dueAmt = p.amount - p.paid;
                    let statusColor = 'text-warning'; 
                    if(p.dueDate < today && dueAmt > 0) statusColor = 'text-danger'; 
                    if(dueAmt <= 0) statusColor = 'text-success'; 
                    
                    return { ...p, supplierName: sup.name, dueAmt, statusColor };
                }).filter(p => p.dueAmt > 0).sort((a,b) => a.dueDate.localeCompare(b.dueDate));

                return `
                     <div class="mb-4">
                        <h2 class="font-bold" style="font-size: 24px;">Due Management</h2>
                        <p class="text-muted">Track upcoming and overdue payments</p>
                    </div>
                    <div class="grid grid-cols-3 gap-4 mb-4">
                         <div class="card p-4 bg-red" style="background: #fee2e2; border: none;">
                            <div class="text-xs font-bold text-danger">OVERDUE</div>
                            <div class="text-2xl font-bold text-danger mt-2">${dues.filter(d => d.dueDate < today).length}</div>
                         </div>
                         <div class="card p-4 bg-orange" style="background: #ffedd5; border: none;">
                            <div class="text-xs font-bold text-warning">UPCOMING</div>
                            <div class="text-2xl font-bold text-warning mt-2">${dues.filter(d => d.dueDate >= today).length}</div>
                         </div>
                         <div class="card p-4 bg-blue" style="background: #e0e7ff; border: none;">
                            <div class="text-xs font-bold text-primary">TOTAL DUE AMT</div>
                            <div class="text-2xl font-bold text-primary mt-2">${utils.formatCurrency(dues.reduce((a,b)=>a+b.dueAmt,0))}</div>
                         </div>
                    </div>
                    <div class="card">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Due Date</th>
                                        <th>Supplier</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${dues.length ? dues.map(d => `
                                        <tr>
                                            <td class="${d.statusColor} font-bold">${utils.formatDate(d.dueDate)}</td>
                                            <td>${d.supplierName}</td>
                                            <td>${utils.formatCurrency(d.dueAmt)}</td>
                                            <td>${d.dueDate < today ? 'Overdue' : 'Upcoming'}</td>
                                            <td><button class="btn btn-primary btn-sm" onclick="openPaymentModal('${d.id}', ${d.dueAmt})">Pay Now</button></td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="5" class="empty-state">No pending dues. Great job!</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            },
            
            reports: () => `
                <div class="mb-4">
                    <h2 class="font-bold" style="font-size: 24px;">Reports</h2>
                    <p class="text-muted">Generate and export business insights</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card p-6 flex flex-col items-center justify-center text-center">
                        <i class="ph ph-file-pdf" style="font-size: 48px; color: var(--danger); margin-bottom: 1rem;"></i>
                        <h3 class="font-bold">Purchase Report</h3>
                        <p class="text-muted text-sm mb-4">Monthly breakdown of all purchases</p>
                        <button class="btn btn-outline" onclick="utils.showToast('Generating Report...')">Download PDF</button>
                    </div>
                    <div class="card p-6 flex flex-col items-center justify-center text-center">
                        <i class="ph ph-microsoft-excel-logo" style="font-size: 48px; color: var(--success); margin-bottom: 1rem;"></i>
                        <h3 class="font-bold">Due Report</h3>
                        <p class="text-muted text-sm mb-4">Excel sheet of outstanding dues</p>
                        <button class="btn btn-outline" onclick="utils.showToast('Exporting to CSV...')">Export CSV</button>
                    </div>
                </div>
            `
        };

        /**
         * --------------------------------------------------------------------------
         * LOGIC & CHARTS
         * --------------------------------------------------------------------------
         */

        const dashboardLogic = {
            init: () => {
                dashboardLogic.drawBarChart();
                dashboardLogic.drawLineChart();
            },
            drawBarChart: () => {
                const canvas = document.getElementById('barChart');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;
                
                const data = [0, 0, 0, 0, 0]; 
                const labels = ['Jun', 'Jul', 'Aug', 'Sep', 'Oct'];
                const maxVal = 100; 
                const barWidth = 40;
                const gap = (canvas.width - (data.length * barWidth)) / (data.length + 1);

                ctx.clearRect(0,0, canvas.width, canvas.height);

                data.forEach((val, i) => {
                    const h = (val / maxVal) * (canvas.height - 50);
                    const x = gap + (i * (barWidth + gap));
                    const y = canvas.height - h - 30;

                    const gradient = ctx.createLinearGradient(0, y, 0, canvas.height);
                    gradient.addColorStop(0, '#4F46E5');
                    gradient.addColorStop(1, '#a5b4fc');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    ctx.roundRect(x, y, barWidth, h, 5);
                    ctx.fill();

                    ctx.fillStyle = '#64748b';
                    ctx.font = '12px Inter';
                    ctx.fillText(labels[i], x + 10, canvas.height - 10);
                });
                
                ctx.fillStyle = '#94a3b8';
                ctx.font = '14px Inter';
                ctx.fillText("No data to display yet.", canvas.width/2 - 60, canvas.height/2);
            },
            drawLineChart: () => {
                const canvas = document.getElementById('lineChart');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;

                ctx.beginPath();
                ctx.moveTo(0, canvas.height - 50);
                ctx.lineTo(canvas.width, canvas.height - 50);
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#94a3b8';
                ctx.font = '14px Inter';
                ctx.fillText("Activity timeline will appear here.", canvas.width/2 - 80, canvas.height/2);
            }
        };

        // --- GLOBAL ACTIONS (Exported to HTML) ---
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        window.toggleTheme = () => {
            const body = document.body;
            if(body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        };

        // --- MODAL ACTIONS ---
        const closeModal = () => {
            document.getElementById('generic-modal').classList.remove('open');
        };

        window.openSupplierModal = async () => {
            document.getElementById('modal-title').innerText = "Add New Supplier";
            document.getElementById('modal-content').innerHTML = `
                <form onsubmit="handleSupplierSubmit(event)" class="flex flex-col gap-4">
                    <input type="text" name="name" placeholder="Supplier Name" required>
                    <input type="text" name="contact" placeholder="Contact Person" required>
                    <input type="text" name="phone" placeholder="Mobile Number" required>
                    <button type="submit" class="btn btn-primary justify-center">Save Supplier</button>
                </form>
            `;
            document.getElementById('generic-modal').classList.add('open');
        };

        window.handleSupplierSubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await DB.add('suppliers', {
                name: formData.get('name'),
                contact: formData.get('contact'),
                phone: formData.get('phone')
            });
            closeModal();
            router.navigate('suppliers');
            utils.showToast('Supplier added', 'success');
        };

        window.openPurchaseModal = async () => {
            const suppliers = await DB.get('suppliers');
            const options = suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            
            document.getElementById('modal-title').innerText = "New Purchase Entry";
            document.getElementById('modal-content').innerHTML = `
                <form onsubmit="handlePurchaseSubmit(event)" class="flex flex-col gap-4">
                    ${options ? `<select name="supplierId" required>${options}</select>` : '<p class="text-danger text-sm">Please add a supplier first.</p><button type="button" class="btn btn-outline" onclick="closeModal(); router.navigate(\'suppliers\')">Go to Suppliers</button>'}
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-xs text-muted">Date</label><input type="date" name="date" required value="${new Date().toISOString().split('T')[0]}"></div>
                        <div><label class="text-xs text-muted">Due Date</label><input type="date" name="dueDate" required></div>
                    </div>
                    <input type="number" name="amount" placeholder="Total Amount (₹)" required>
                    <button type="submit" class="btn btn-primary justify-center" ${!options ? 'disabled' : ''}>Create Purchase</button>
                </form>
            `;
            document.getElementById('generic-modal').classList.add('open');

            if(!options) return; 

            window.handlePurchaseSubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = parseFloat(formData.get('amount'));
                await DB.add('purchases', {
                    supplierId: formData.get('supplierId'),
                    date: formData.get('date'),
                    dueDate: formData.get('dueDate'),
                    amount: amount,
                    paid: 0,
                    status: 'Unpaid'
                });
                closeModal();
                router.navigate('purchases');
                utils.showToast('Purchase recorded', 'success');
            };
        };

        window.openExpenseModal = () => {
             document.getElementById('modal-title').innerText = "Add Expense";
             document.getElementById('modal-content').innerHTML = `
                <form onsubmit="handleExpenseSubmit(event)" class="flex flex-col gap-4">
                    <div class="grid grid-cols-2 gap-2">
                         <div><label class="text-xs text-muted">Date</label><input type="date" name="date" required value="${new Date().toISOString().split('T')[0]}"></div>
                         <div><label class="text-xs text-muted">Amount</label><input type="number" name="amount" placeholder="₹" required></div>
                    </div>
                    <select name="category">
                        <option value="Rent">Rent</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Salary">Salary</option>
                        <option value="Transport">Transport</option>
                        <option value="Miscellaneous">Miscellaneous</option>
                    </select>
                    <textarea name="description" placeholder="Description" rows="2"></textarea>
                    <button type="submit" class="btn btn-primary justify-center">Save Expense</button>
                </form>
            `;
            document.getElementById('generic-modal').classList.add('open');
            
            window.handleExpenseSubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await DB.add('expenses', {
                    date: formData.get('date'),
                    amount: formData.get('amount'),
                    category: formData.get('category'),
                    description: formData.get('description')
                });
                closeModal();
                router.navigate('expenses');
                utils.showToast('Expense added', 'success');
            };
        };

        window.openPaymentModal = async (purchaseId, dueAmt) => {
            document.getElementById('modal-title').innerText = "Record Payment";
            document.getElementById('modal-content').innerHTML = `
                <div class="mb-4 text-sm">
                    <span class="text-muted">Due Amount:</span> 
                    <span class="font-bold text-danger">${utils.formatCurrency(dueAmt)}</span>
                </div>
                <form onsubmit="handlePaymentSubmit(event, '${purchaseId}')" class="flex flex-col gap-4">
                    <input type="number" name="amount" placeholder="Paying Amount (₹)" max="${dueAmt}" required>
                    <select name="method">
                        <option value="Cash">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Cheque">Cheque</option>
                    </select>
                    <button type="submit" class="btn justify-center" style="background: var(--success); color: white;">Confirm Payment</button>
                </form>
            `;
            document.getElementById('generic-modal').classList.add('open');

            window.handlePaymentSubmit = async (e, pid) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const payAmt = parseFloat(formData.get('amount'));
                
                const purchases = await DB.get('purchases');
                const purchase = purchases.find(p => p.id === pid);
                
                if(purchase) {
                    const newPaid = parseFloat(purchase.paid) + payAmt;
                    const newStatus = newPaid >= parseFloat(purchase.amount) ? 'Paid' : 'Partial';
                    
                    await DB.update('purchases', pid, { paid: newPaid, status: newStatus });
                    
                    await DB.add('payments', {
                        purchaseId: pid,
                        date: new Date().toISOString().split('T')[0],
                        amount: payAmt,
                        method: formData.get('method')
                    });

                    closeModal();
                    router.navigate('purchases');
                    utils.showToast('Payment recorded', 'success');
                }
            };
        };

        window.deleteItem = async (collection, id) => {
            if(confirm('Are you sure you want to delete this?')) {
                await DB.delete(collection, id);
                router.navigate(router.current);
                utils.showToast('Deleted successfully', 'info');
            }
        };

        // --- INIT ---
        window.addEventListener('resize', () => {
            if(router.current === 'dashboard') dashboardLogic.init();
        });

    </script>
</body>
</html>
